name: Update match results
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached previous files
        uses: actions/cache@v4
        with:
          path: .cache/prev
          key: openfootball-prev-${{ github.run_id }}
          restore-keys: openfootball-prev-

      - name: Download openfootball raw files
        run: |
          mkdir -p .cache .cache/prev
          curl -sL -o .cache/cup.txt \
            "https://raw.githubusercontent.com/openfootball/worldcup/refs/heads/master/2026--usa/cup.txt"
          curl -sL -o .cache/cup_finals.txt \
            "https://raw.githubusercontent.com/openfootball/worldcup/refs/heads/master/2026--usa/cup_finals.txt"

      - name: Check if data changed
        id: changed
        run: |
          touch .cache/prev/cup.txt .cache/prev/cup_finals.txt
          if ! diff -q .cache/cup.txt .cache/prev/cup.txt ||
             ! diff -q .cache/cup_finals.txt .cache/prev/cup_finals.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changed, will regenerate"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.changed.outputs.changed == 'true'

      - name: Generate data.json from local files
        if: steps.changed.outputs.changed == 'true'
        run: |
          cargo run --manifest-path crates/cli/Cargo.toml -- fetch \
            --cup .cache/cup.txt --finals .cache/cup_finals.txt

      - name: Save cache and commit
        if: steps.changed.outputs.changed == 'true'
        run: |
          cp .cache/cup.txt .cache/prev/
          cp .cache/cup_finals.txt .cache/prev/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json; then
            echo "data.json unchanged, nothing to commit"
          else
            git add data.json
            git commit -m "chore: update match results"
            git push
            echo "Committed and pushed updated data.json"
          fi
